  const amtInp=document.createElement('input'); amtInp.className='form-input'; amtInp.type='number'; amtInp.step='0.01'; amtInp.placeholder='0.00'; amtInp.value=d.amount||'';
  const amtPrev=document.createElement('div'); amtPrev.style.cssText='font-size:12px;color:var(--muted);margin-top:4px;padding:4px 8px;background:var(--amber-bg);border-radius:4px;display:none;';
  const updatePrev=val=>{
    const n=parseFloat(val)||0;
    if(!n||d.currency!=='AED'){ amtPrev.style.display='none'; return; }
    amtPrev.style.display='block';
    amtPrev.textContent='≈ ₱'+(n*enbdRate).toLocaleString('en-US',{minimumFractionDigits:2})+' @ ENBD rate';
  };
  amtInp.addEventListener('input',e=>{ d.amount=e.target.value; updatePrev(e.target.value); });
  if(d.amount) updatePrev(d.amount);
  amtG.appendChild(amtInp); amtG.appendChild(amtPrev); m.appendChild(amtG);

  // Month/Year for this entry
  const bm=d.month!==undefined?d.month:(appState.budgetMonth||new Date().getMonth());
  const by=d.year||appState.budgetYear||new Date().getFullYear();
  const myRow=document.createElement('div'); myRow.className='form-row';
  const monG=document.createElement('div'); monG.className='form-group'; monG.innerHTML='<label class="form-label">Month</label>';
  const monSel=document.createElement('select'); monSel.className='form-select';
  MONTHS.forEach((mn,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=mn; if(i===bm)o.selected=true; monSel.appendChild(o); });
  monSel.addEventListener('change',e=>d.month=parseInt(e.target.value));
  monG.appendChild(monSel); myRow.appendChild(monG);
  const yrG=document.createElement('div'); yrG.className='form-group'; yrG.innerHTML='<label class="form-label">Year</label>';
  const yrSel=document.createElement('select'); yrSel.className='form-select';
  const nowY=new Date().getFullYear();
  for(let y=nowY-1;y<=nowY+2;y++){ const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===by)o.selected=true; yrSel.appendChild(o); }
  yrSel.addEventListener('change',e=>d.year=parseInt(e.target.value));
  yrG.appendChild(yrSel); myRow.appendChild(yrG);

  phLbl.textContent='🇵🇭 Mark as PH Allowance';
  phChk.addEventListener('change',e=>d.isPHAllowance=e.target.checked);
  phG.appendChild(phChk); phG.appendChild(phLbl); m.appendChild(phG);

  m.appendChild(fg('Notes','text',d.notes||'','Optional',v=>d.notes=v));

  const foot=document.createElement('div'); foot.className='modal-footer';
  const cancel=document.createElement('button'); cancel.className='btn btn-outline'; cancel.textContent='Cancel'; cancel.addEventListener('click',()=>{appState.modal=null;render();});
  const save=document.createElement('button'); save.className='btn btn-primary'; save.textContent=isEdit?'Save Changes':'Add to Monthly Budget';
  save.addEventListener('click',()=>{
    if(!d.label){toast('Enter a label');return;}
    if(!d.amount||parseFloat(d.amount)<=0){toast('Enter a valid amount');return;}
    if(!appState.monthlyBudget) appState.monthlyBudget=[];
    const entry={...d, amount:parseFloat(d.amount), type:'expense'};
    const idx=appState.monthlyBudget.findIndex(i=>i.id===d.id);
    if(idx>-1) appState.monthlyBudget[idx]=entry; else appState.monthlyBudget.push(entry);
    saveLocal(); appState.modal=null;
    toast((isEdit?'Updated':'Added')+' to Monthly Budget \u2713');
    render();
  });
  if(isEdit){
    const del=document.createElement('button'); del.className='btn btn-danger'; del.textContent='Delete';
    del.addEventListener('click',()=>{
      if(!confirm('Remove this entry from Monthly Budget?')) return;
      appState.monthlyBudget=appState.monthlyBudget.filter(i=>i.id!==d.id);
      saveLocal(); appState.modal=null; toast('Deleted'); render();
    });
    foot.appendChild(del);
  }
  foot.appendChild(cancel); foot.appendChild(save); m.appendChild(foot);
}

        <td style="color:var(--muted);font-size:12px">AED ${(item.currency==='AED'?amt:(item.currency==='PHP'?amt/enbdRate:amt*(fxRates.AED||3.6725))).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
        <td>${item.isPHAllowance?'<span class="mb-ph-badge">🇵🇭</span>':'—'}</td>
        <td><span class="db-status ${item.sent?'db-status-done':'db-status-pending'}">${item.sent?'✓ Sent':'Pending'}</span></td>
        <td></td>`;
      const editCell=tr.cells[6];
      const editRowBtn=document.createElement('button'); editRowBtn.className='btn btn-outline btn-sm'; editRowBtn.textContent='Edit';
      editRowBtn.addEventListener('click',()=>openMemberBudgetEntryModal(memberId, fm?.label||'Member', item));

function printMemberBudget(fm, bm, by, enbdRate){
  if(!fm) return;
  const memberName=(fm.label||'').toLowerCase();
  const mbItems=(appState.monthlyBudget||[]).filter(i=>i.month===bm&&i.year===by);
  const allMemberExpenses=mbItems.filter(i=>i.type==='expense'&&i.label&&i.label.toLowerCase().includes(memberName));

  // Helper: convert any item amount to AED correctly
  function toAED(item){ const a=parseFloat(item.amount||0); if(item.currency==='PHP') return a/enbdRate; return a; }
  function toPHP(item){ const a=parseFloat(item.amount||0); if(item.currency==='PHP') return a; return a*enbdRate; }
  function fmtAED(item){ const a=toAED(item); return 'AED '+a.toLocaleString('en-US',{minimumFractionDigits:2}); }
  function fmtPHP(item){ const p=toPHP(item); return '₱'+p.toLocaleString('en-US',{minimumFractionDigits:2}); }

  const totalAED=allMemberExpenses.reduce((s,i)=>s+toAED(i),0);
  const totalPHP=allMemberExpenses.reduce((s,i)=>s+toPHP(i),0);

  const rows=allMemberExpenses.map(item=>{
    return `<tr><td>${item.label||item.category||'—'}</td><td>${item.category||'General'}</td><td style="text-align:right">${fmtAED(item)}</td><td style="text-align:right">${fmtPHP(item)}</td><td style="text-align:center">${item.isPHAllowance?'🇵🇭 Yes':'—'}</td><td style="text-align:center">${item.sent?'✓ Sent':'Pending'}</td></tr>`;
  }).join('');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${fm.icon} ${fm.label} — Budget ${MONTHS[bm]} ${by}</title>
  <style>
    body{font-family:'DM Sans',Arial,sans-serif;padding:32px;color:#1a1a1a;font-size:13px;}
    h1{font-size:22px;font-weight:700;margin:0 0 4px;}
    .sub{color:#666;font-size:13px;margin-bottom:24px;}
    table{width:100%;border-collapse:collapse;margin-top:16px;}
    th{background:#f0fdf9;color:#1D9E75;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:left;border-bottom:2px solid #D1FAE5;}
    td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top;}
    tfoot tr{background:#f8fafc;font-weight:700;}
    .badge{font-size:10px;background:#D1FAE5;color:#065F46;padding:2px 7px;border-radius:100px;}
    .footer{margin-top:24px;font-size:11px;color:#999;border-top:1px solid #eee;padding-top:12px;}
    .stats{display:flex;gap:16px;margin-bottom:24px;}
    .stat{flex:1;background:#f8fafc;border-radius:8px;padding:12px 16px;}
    .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:4px;}
    .stat-val{font-size:18px;font-weight:700;}
  </style></head><body>
  <h1>${fm.icon} ${fm.label} — Monthly Budget</h1>
  <div class="sub">${MONTHS[bm]} ${by} &nbsp;·&nbsp; Prepared by Stephen Reyes VA</div>
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Budget (AED)</div><div class="stat-val" style="color:#DC2626">AED ${totalAED.toLocaleString('en-US',{minimumFractionDigits:2})}</div></div>
    <div class="stat"><div class="stat-label">PHP Equivalent</div><div class="stat-val" style="color:#1D9E75">₱${totalPHP.toLocaleString('en-US',{minimumFractionDigits:2})}</div></div>
    <div class="stat"><div class="stat-label">ENBD Rate</div><div class="stat-val" style="font-size:14px;color:#666">1 AED ≈ ₱${enbdRate.toFixed(4)}</div></div>
  </div>
  <table>
    <thead><tr><th>Description</th><th>Category</th><th style="text-align:right">AED</th><th style="text-align:right">PHP</th><th style="text-align:center">PH Allowance</th><th style="text-align:center">Status</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="2"><strong>TOTAL</strong></td><td style="text-align:right">AED ${totalAED.toLocaleString('en-US',{minimumFractionDigits:2})}</td><td style="text-align:right">₱${totalPHP.toLocaleString('en-US',{minimumFractionDigits:2})}</td><td colspan="2"></td></tr></tfoot>
  </table>
  <div class="footer">Generated: ${new Date().toLocaleString('en-US',{dateStyle:'long',timeStyle:'short'})} &nbsp;·&nbsp; Stephen Reyes VA Portal</div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const w=window.open('','_blank','width=900,height=650');
  if(w){ w.document.write(html); w.document.close(); }
}

function generateDebtCtrlNo(){
  const existing=(appState.manualDebts||[]).map(d=>d.ctrlNo||'').filter(Boolean);
  let n=1;
  while(existing.includes('DEBT-'+String(n).padStart(4,'0'))) n++;
  return 'DEBT-'+String(n).padStart(4,'0');
}
function openDebtModal(item){

  }}; render();
}

    balPrev.innerHTML=`Balance: ${d.currency==='PHP'?'₱':'AED '}${balance.toLocaleString('en-US',{minimumFractionDigits:2})} ${balance<=0?'<span style="font-size:11px">✓ Fully paid</span>':'<span style="font-size:11px;animation:db-pulse 2s infinite;display:inline-block;">⚡ Outstanding</span>'}`;

  foot.appendChild(cancel); foot.appendChild(save); m.appendChild(foot);
}

// ── MONTHLY BUDGET PAGE ───────────────────────────────────────────────────────
const MB_EXPENSE_PRESETS=['Bank 1','Bank 2','Bank 3','Car','Sewa','House Rent','PH Allowance','Groceries','Utilities','Phone','Internet','Insurance','Entertainment','Other'];
function buildMonthlyBudgetPage(){
  const div=document.createElement('div');

  // Convert everything to AED for totals (PHP entries divided by ENBD rate)

  const totalInPHP_native=income.filter(i=>i.currency==='PHP').reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const totalExPHP_native=expenses.filter(i=>i.currency==='PHP').reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const hasIncPHP=income.some(i=>i.currency==='PHP');
  const hasExpPHP=expenses.some(i=>i.currency==='PHP');
  const totalIn=totalInAED; const totalEx=totalExAED;
  const netBal=totalIn-totalEx;

  // Header
  const hdr=document.createElement('div'); hdr.className='page-header';
  const htxt=document.createElement('div'); htxt.innerHTML=`<div class="page-title">📅 Monthly Budget</div><div class="page-sub">${MONTHS[bm]} ${by}</div>`; hdr.appendChild(htxt);
  const hRight=document.createElement('div'); hRight.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap;';
  const ms=document.createElement('div'); ms.className='month-selector';
  const mSel=document.createElement('select');

  const ySel=document.createElement('select');

  ySel.addEventListener('change',e=>{ appState.budgetYear=parseInt(e.target.value); render(); });

  enbdNote.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Emirates NBD rate: <strong>1 AED ≈ ₱${enbdRate.toFixed(4)}</strong> (market rate –2% est.) &nbsp;·&nbsp; ${fxFetched?'<span style="color:var(--teal-d)">✓ Live</span>':'Approx.'}`;
  div.appendChild(enbdNote);

  // Summary cards
  const sg=document.createElement('div'); sg.className='stats-grid'; sg.style.gridTemplateColumns='repeat(3,1fr)'; sg.style.marginBottom='1.5rem';
  const fmtMB=(amt,currency)=>{
    const c=currency||'AED';
    const sym=c==='PHP'?'₱':c==='USD'?'$':'AED ';
    return sym+parseFloat(amt||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  };
  const incLabel=hasIncPHP&&totalInAED>0?`~AED ${totalInAED.toLocaleString('en-US',{minimumFractionDigits:2})}`:hasIncPHP?`₱${totalInPHP_native.toLocaleString('en-US',{minimumFractionDigits:2})}`:`AED ${totalInAED.toLocaleString('en-US',{minimumFractionDigits:2})}`;
  const expLabel=hasExpPHP&&totalExAED>0?`~AED ${totalExAED.toLocaleString('en-US',{minimumFractionDigits:2})}`:hasExpPHP?`₱${totalExPHP_native.toLocaleString('en-US',{minimumFractionDigits:2})}`:`AED ${totalExAED.toLocaleString('en-US',{minimumFractionDigits:2})}`;
  const netLabel=(netBal>=0?'+':'')+`AED ${Math.abs(netBal).toLocaleString('en-US',{minimumFractionDigits:2})}`;
  sg.innerHTML=`
    <div class="stat-card stat-card-income"><div class="stat-label">Total Income</div><div class="stat-value teal">${incLabel}</div><div class="stat-sub">${income.length} source${income.length!==1?'s':''}</div></div>
    <div class="stat-card stat-card-expense"><div class="stat-label">Total Expenses</div><div class="stat-value" style="color:var(--red)">${expLabel}</div><div class="stat-sub">${expenses.length} item${expenses.length!==1?'s':''}</div></div>
    <div class="stat-card ${netBal>=0?'stat-card-balance-pos':'stat-card-balance-neg'}"><div class="stat-label">Net Balance</div><div class="stat-value" style="color:${netBal>=0?'var(--blue)':'var(--red)'}">${netLabel}</div><div class="stat-sub">${netBal>=0?'Surplus':'Deficit'}</div></div>`;
  div.appendChild(sg);

  // ── Income section ──
  const incSec=document.createElement('div'); incSec.className='mb-section';
  const incTitle=document.createElement('div'); incTitle.className='mb-section-title';
  incTitle.innerHTML=`<span>💰 Income</span>`;
  const addInBtn=document.createElement('button'); addInBtn.className='btn btn-primary btn-sm'; addInBtn.innerHTML=`+ Add Income`; addInBtn.addEventListener('click',()=>openMBModal('income',null,bm,by)); incTitle.appendChild(addInBtn);
  incSec.appendChild(incTitle);
  if(!income.length){ const noInc=document.createElement('div'); noInc.style.cssText='color:var(--hint);font-size:13px;padding:8px 0;'; noInc.textContent='No income entries for this month.'; incSec.appendChild(noInc); }
  income.forEach(item=>{
    const row=buildMBRow(item, enbdRate, fmtMB); incSec.appendChild(row);
  });
  if(income.length){
    const totBar=document.createElement('div'); totBar.className='mb-total-bar';
    totBar.innerHTML=`<span style="font-size:12px;color:var(--teal-d);font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Total Income</span><span style="font-size:15px;font-weight:700;color:var(--teal-d)">${incLabel}</span>`;
    incSec.appendChild(totBar);
  }
  div.appendChild(incSec);

  // ── Expenses section ──
  const exSec=document.createElement('div'); exSec.className='mb-section';
  const exTitle=document.createElement('div'); exTitle.className='mb-section-title';
  exTitle.innerHTML=`<span>🧾 Expenses</span>`;
  const addExBtn=document.createElement('button'); addExBtn.className='btn btn-primary btn-sm'; addExBtn.innerHTML=`+ Add Expense`; addExBtn.addEventListener('click',()=>openMBModal('expense',null,bm,by)); exTitle.appendChild(addExBtn);
  exSec.appendChild(exTitle);
  if(!expenses.length){ const noEx=document.createElement('div'); noEx.style.cssText='color:var(--hint);font-size:13px;padding:8px 0;'; noEx.textContent='No expense entries for this month.'; exSec.appendChild(noEx); }
  expenses.forEach(item=>{
    const row=buildMBRow(item, enbdRate, fmtMB); exSec.appendChild(row);
  });
  if(expenses.length){
    const totBar=document.createElement('div'); totBar.className='mb-total-bar'; totBar.style.background='var(--red-bg)'; totBar.style.borderColor='#FCA5A5';
    const totalPHP=expenses.filter(i=>i.isPHAllowance).reduce((s,i)=>{ const a=parseFloat(i.amount||0); return s+(i.currency==='PHP'?a:a*enbdRate); },0);
    totBar.innerHTML=`<div><div style="font-size:12px;color:var(--red);font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Total Expenses</div>${totalPHP>0?`<div style="font-size:11px;color:var(--muted)">PH Allowance: ₱${totalPHP.toLocaleString('en-US',{minimumFractionDigits:2})}</div>`:''}</div><span style="font-size:15px;font-weight:700;color:var(--red)">${expLabel}</span>`;
    exSec.appendChild(totBar);
  }
  div.appendChild(exSec);
  return div;
}
function buildMBRow(item, enbdRate, fmtMB){
  const row=document.createElement('div'); row.className='mb-row';
  const sym=item.currency==='PHP'?'₱':item.currency==='USD'?'$':'AED ';
  const phpConv=(item.currency==='AED'&&(item.isPHAllowance||item.showPHP))?' ≈ ₱'+(parseFloat(item.amount||0)*enbdRate).toLocaleString('en-US',{minimumFractionDigits:2}):'';
  row.innerHTML=`
    <div class="mb-row-label">${item.label||item.category||'—'}</div>
    <span class="mb-row-cat">${item.category||'Other'}</span>
    ${item.isPHAllowance?'<span class="mb-ph-badge">🇵🇭 PH Allowance</span>':''}
    <div style="text-align:right;min-width:110px;">
      <div class="mb-row-amount" style="color:${item.type==='income'?'var(--teal)':'var(--red)'}">${sym}${parseFloat(item.amount||0).toLocaleString('en-US',{minimumFractionDigits:2})}</div>
      ${phpConv?`<div class="mb-row-php">${phpConv}</div>`:''}
    </div>
    ${item.isPHAllowance?`<span class="mb-sent-badge" style="background:${item.sent?'var(--teal-bg)':'var(--amber-bg)'};color:${item.sent?'var(--teal-d)':'var(--amber)'}">${item.sent?'✓ Sent':'Pending'}</span>`:''}`;
  row.style.cursor='pointer';
  row.addEventListener('click',()=>openMBModal(item.type,item));
  return row;
}
function openMBModal(type,item,overrideBm,overrideBy){

  const useBy = overrideBy!==undefined ? overrideBy : appState.budgetYear;
  appState.modal={type:'mb_item',mbType:type,data:item?{...item}:{id:'mb_'+Date.now(),type,month:useBm,year:useBy,label:'',category:type==='expense'?'House Rent':'Freelance',amount:'',currency:'AED',isPHAllowance:false,sent:false,notes:''}}; render();
}
function buildMBItemModal(m){
  const d = appState.modal.data;
  if(!d) return;

  // ── Migrate old flat categories saved in existing records ─────────────────
  const OLD_TO_CAT   = {'Salary':'Freelance Income','Bonus':'Freelance Income','Freelance':'Freelance Income'};
  const OLD_TO_SUB   = {'Salary':'Salary','Bonus':'Bonus','Remittance':'Salary'};
  if(d.type!=='expense' && OLD_TO_CAT[d.category]){
    if(!d.subType) d.subType = OLD_TO_SUB[d.category] || 'Salary';
    d.category = OLD_TO_CAT[d.category];
  }

  const isExpense = d.type === 'expense';
  const isEdit    = !!(d.id && appState.monthlyBudget && appState.monthlyBudget.find(i=>i.id===d.id));

  // ── Income sub-type constants ─────────────────────────────────────────────
  const INC_TOP_CATS  = ['Freelance Income','Full-Time Job','Investment','Remittance','Other'];
  const HAS_CLIENTS   = ['Freelance Income','Full-Time Job'];
  const cat    = d.category || (isExpense ? 'House Rent' : 'Freelance Income');
  const subType= d.subType  || 'Salary';
  const hasClients = !isExpense && HAS_CLIENTS.includes(cat);

  // ── Rebuild modal ─────────────────────────────────────────────────────────
  m.innerHTML = `<div class="modal-title">${isEdit?'Edit':'Add'} ${isExpense?'Expense':'Income'}</div>`;

  // ── EXPENSE: simple category dropdown ─────────────────────────────────────
  if(isExpense){
    const labG=document.createElement('div'); labG.className='form-group'; labG.innerHTML='<label class="form-label">Category / Label</label>';
    const labSel=document.createElement('select'); labSel.className='form-select';
    MB_EXPENSE_PRESETS.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; if(c===cat)o.selected=true; labSel.appendChild(o); });
    const addNew=document.createElement('option'); addNew.value='__new__'; addNew.textContent='+ Add new category...'; labSel.appendChild(addNew);
    labSel.addEventListener('change',e=>{
      if(e.target.value==='__new__'){
        const v=prompt('New category name:'); if(v){ d.category=v; d.label=v; buildMBItemModal(m); } else labSel.value=d.category;
      } else { d.category=e.target.value; d.label=e.target.value; buildMBItemModal(m); }
    });
    labG.appendChild(labSel); m.appendChild(labG);

  // ── INCOME: hierarchical category ─────────────────────────────────────────
  } else {
    // 1. Top category
    const cgEl=document.createElement('div'); cgEl.className='form-group';
    cgEl.innerHTML='<label class="form-label">Category</label>';
    const cSel=document.createElement('select'); cSel.className='form-select';
    INC_TOP_CATS.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c==='Freelance Income'?'🏠 WFH / Freelance':c==='Full-Time Job'?'🏢 Onsite / Full-Time':c; if(c===cat)o.selected=true; cSel.appendChild(o); });
    cSel.addEventListener('change',e=>{
      const newCat=e.target.value;
      if(newCat===d.category) return;
      d.category=newCat; d.source=''; d.clientId=''; d.amount=''; d.notes=''; d.currency='AED';
      d.subType=HAS_CLIENTS.includes(newCat)?'Salary':'';
      d.label='';
      buildMBItemModal(m);
    });
    cgEl.appendChild(cSel); m.appendChild(cgEl);

    // 2. Salary / Bonus toggle for Freelance & Full-Time
    if(hasClients){
      const stG=document.createElement('div'); stG.className='form-group';
      stG.innerHTML='<label class="form-label">Income Type</label>';
      const stRow=document.createElement('div'); stRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;';
      [{val:'Salary',icon:'💼',hint:cat==='Full-Time Job'?'Fixed monthly / onsite pay':'Hours-based / remote earnings'},
       {val:'Bonus', icon:'🎁',hint:'Extra / one-time payment'}
      ].forEach(({val,icon,hint})=>{
        const isActive=subType===val;
        const btn=document.createElement('button'); btn.type='button';
        btn.style.cssText=`padding:10px 12px;border-radius:var(--radius-sm);border:2px solid ${isActive?'var(--teal)':'var(--border)'};background:${isActive?'var(--teal-bg)':'var(--white)'};cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .12s;`;
        btn.innerHTML=`<div style="font-size:13px;font-weight:600;color:${isActive?'var(--teal)':'var(--text)'}">${icon} ${val}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${hint}</div>`;
        btn.addEventListener('click',()=>{
          if(d.subType===val) return;
          // Only clear client/amount/notes — never touch category
          d.subType=val; d.source=''; d.clientId=''; d.amount=''; d.notes=''; d.currency='AED'; d.label='';
          buildMBItemModal(m);
        });
        stRow.appendChild(btn);
      });
      stG.appendChild(stRow); m.appendChild(stG);
    }

    // 3. Client cards
    if(hasClients && appState.clients && appState.clients.length){
      const isSalary = subType==='Salary';
      const isBonus  = subType==='Bonus';
      const clG=document.createElement('div'); clG.className='form-group';
      const subLabel = isSalary
        ? (cat==='Full-Time Job'?'Company — onsite salary':'Client — WFH hours logged')
        : 'Company / Client — who gave the bonus';
      clG.innerHTML=`<label class="form-label">${cat==='Full-Time Job'?'Company':'From Client'} <span style="color:var(--hint);font-weight:400;font-size:11px;">${subLabel}</span></label>`;

      const useMonth = d.month!==undefined ? d.month : appState.budgetMonth;
      const useYear  = d.year!==undefined  ? d.year  : appState.budgetYear;
      const enbdRate = getEnbdRate();

      appState.clients.filter(client=>{
        const it=client.incomeType||'wfh';
        if(cat==='Freelance Income') return it==='wfh';
        if(cat==='Full-Time Job')    return it==='onsite';
        return true; // Remittance/Other — show all
      }).forEach(client=>{
        const cd        = appState.clientData[client.id] || {};
        const allEntries= cd.entries || [];
        const clientCur = client.rateCurrency || 'USD';
        const sym       = clientCur==='PHP'?'₱':clientCur==='AED'?'AED ':'$';
        const rateType  = client.rateType || 'Hourly';
        const isSelected= d.clientId===client.id;

        // Build month→hours map
        const monthMap={};
        allEntries.forEach(e=>{ if(!e.date) return; const k=e.date.slice(0,7); monthMap[k]=(monthMap[k]||0)+(parseFloat(e.hours)||0); });
        const targetKey=`${useYear}-${String(useMonth+1).padStart(2,'0')}`;
        let pickKey=monthMap[targetKey]>0?targetKey:null;
        if(!pickKey){ const sk=Object.keys(monthMap).filter(k=>monthMap[k]>0).sort().reverse(); pickKey=sk[0]||null; }
        const pickedHours=pickKey?monthMap[pickKey]:0;
        const pickLabel=pickKey?(()=>{const[py,pm]=pickKey.split('-');return MONTHS[parseInt(pm)-1]+' '+py;})():'';
        let latestAmt=0;
        if(rateType==='Monthly') latestAmt=client.rate||0;

        else latestAmt=Math.round(pickedHours*(client.rate||0)*100)/100;

        const aedEq=clientCur==='USD'?(latestAmt*(fxRates.AED||3.6725)).toFixed(2):'—';
        const phpEq=clientCur==='AED'?(latestAmt*enbdRate).toLocaleString('en-US',{minimumFractionDigits:2}):clientCur==='USD'?(latestAmt*(fxRates.PHP||56)).toLocaleString('en-US',{minimumFractionDigits:2}):'—';

        const card=document.createElement('div');

        let subLine='';
        if(isSalary && latestAmt>0){
          const rateDetail=rateType==='Monthly'?'monthly rate':rateType==='Daily'?`${new Set(allEntries.filter(e=>e.date&&e.date.startsWith(pickKey||'')).map(e=>e.date)).size} days`:`${pickedHours.toFixed(1)}h logged`;
          subLine=`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${sym}${latestAmt.toFixed(2)} · ${pickLabel} · ${rateDetail}</div>`+(clientCur==='USD'?`<div style="font-size:11px;color:var(--hint);margin-top:1px;">≈ AED ${aedEq} · ≈ ₱${phpEq}</div>`:'');
        } else if(isSalary){
          subLine=`<div style="font-size:11px;color:var(--hint);margin-top:2px;">No entries yet · ${clientCur}</div>`;
        } else {
          subLine=`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${client.company||client.name} · ${clientCur} · Enter amount manually</div>`;
        }
        card.innerHTML=`<div style="font-weight:600;font-size:13px;color:${isSelected?'var(--teal)':'var(--text)'}">${client.company||client.name}${isSelected?' <span style="font-size:11px;margin-left:4px;">✓</span>':''}</div>${subLine}`;

        card.addEventListener('click',()=>{
          // NEVER touch d.category or d.subType here
          d.clientId=client.id;
          d.source=client.company||client.name;
          d.currency=clientCur;
          if(isSalary && latestAmt>0){
            d.amount=latestAmt;
            const rateDetail=rateType==='Monthly'?'monthly rate':rateType==='Daily'?`${new Set(allEntries.filter(e=>e.date&&e.date.startsWith(pickKey||'')).map(e=>e.date)).size} days @ ${clientCur} ${client.rate||0}/day`:`${pickedHours.toFixed(1)}h @ ${clientCur} ${client.rate||0}/hr`;
            d.notes=`${pickLabel} — ${rateDetail}`;
            d.label=(client.company||client.name)+' — '+(pickLabel||MONTHS[useMonth]+' '+useYear);
          } else {
            d.amount=''; d.notes='Bonus from '+(client.company||client.name); d.label='Bonus — '+(client.company||client.name);
          }
          buildMBItemModal(m);
        });
        clG.appendChild(card);
      });

      if(isBonus){
        const tip=document.createElement('div'); tip.style.cssText='font-size:11px;color:var(--amber);padding:6px 10px;background:var(--amber-bg);border-radius:var(--radius-sm);margin-top:4px;';
        tip.textContent='💡 Bonus — select who gave it, then enter the amount below.';
        clG.appendChild(tip);
      }
      m.appendChild(clG);

    } else if(hasClients){
      // Has client category but no clients saved yet
      m.appendChild(fg('Source / Name','text',d.source||'','e.g. Company name',v=>{d.source=v;d.label=v;}));

// ── BOOKKEEPING PAGE (Xero-style) ─────────────────────────────────────────────
const BK_ACCOUNT_TYPES=['Assets','Liabilities','Equity','Revenue','Expenses'];
const BK_TX_TYPES=['income','expense','transfer','journal'];
const DEFAULT_BK_ACCOUNTS=[
  {id:'bk_cash',code:'1001',name:'Cash & Bank',type:'Assets'},
  {id:'bk_recv',code:'1100',name:'Accounts Receivable',type:'Assets'},
  {id:'bk_pay', code:'2100',name:'Accounts Payable / Debt',type:'Liabilities'},
  {id:'bk_rev', code:'4000',name:'Revenue',type:'Revenue'},
  {id:'bk_sal', code:'6001',name:'Salary Expenses',type:'Expenses'},
  {id:'bk_op',  code:'6100',name:'Operating Expenses',type:'Expenses'},
];
function ensureDefaultBKAccounts(){
  if(!appState.bookkeeping) appState.bookkeeping={transactions:[],accounts:[]};
  if(!appState.bookkeeping.accounts||appState.bookkeeping.accounts.length===0){
    appState.bookkeeping.accounts=[...DEFAULT_BK_ACCOUNTS]; saveLocal();
  }
}
function syncAllToBookkeeping(){
  // Pull every monthlyBudget entry and dailyTap entry into bookkeeping (if not already there)
  ensureDefaultBKAccounts();
  const bk=appState.bookkeeping;
  const revAcc=bk.accounts.find(a=>a.id==='bk_rev')||bk.accounts[0];
  const expAcc=bk.accounts.find(a=>a.id==='bk_op')||bk.accounts[0];
  const cashAcc=bk.accounts.find(a=>a.id==='bk_cash')||bk.accounts[0];
  let changed=false;

  // Monthly Budget entries
  (appState.monthlyBudget||[]).forEach(item=>{
    const srcId='mb_'+item.id;
    if(bk.transactions.find(t=>t.srcId===srcId)) return; // already synced
    const mn=String((item.month||0)+1).padStart(2,'0');
    const dateStr=`${item.year||new Date().getFullYear()}-${mn}-01`;
    bk.transactions.push({
      id:'bktx_mb_'+item.id, srcId, ref:'MB',
      date:dateStr,
      description:(item.label||item.category||'Budget entry'),
      txType:item.type==='income'?'income':'expense',
      accountId:item.type==='income'?(revAcc?.id||''):(expAcc?.id||''),
      amount:parseFloat(item.amount||0),
      currency:item.currency||'AED',
      notes:'Auto-imported from Monthly Budget'+(item.isPHAllowance?' · PH Allowance':''),
      source:'monthly_budget'
    });
    changed=true;
  });

  // Daily Tap entries
  (appState.dailyTap||[]).forEach(tap=>{
    const srcId='tap_'+tap.id;
    if(bk.transactions.find(t=>t.srcId===srcId)) return;
    const bank=(appState.banks||[]).find(b=>b.id===tap.bankId);
    bk.transactions.push({
      id:'bktx_tap_'+tap.id, srcId, ref:'TAP',
      date:tap.date||new Date().toISOString().slice(0,10),
      description:tap.description||'Daily Tap',
      txType:tap.tapType==='in'?'income':'expense',
      accountId:cashAcc?.id||'',
      amount:parseFloat(tap.amount||0),
      currency:tap.currency||bank?.currency||'AED',
      notes:'Auto-imported from Daily Tap'+(bank?' · '+bank.name:''),
      source:'daily_tap'
    });
    changed=true;
  });

  if(changed) saveLocal();
}

function fmtCurrency(amount, currency){
  const n=parseFloat(amount||0);
  const sym={AED:'AED ',PHP:'₱',USD:'$'}[currency]||'AED ';
  return sym+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function deduplicateBKTransactions(){
  const bk=appState.bookkeeping;
  if(!bk||!bk.transactions) return;
  // Remove duplicates: keep the first occurrence of each srcId
  const seen=new Set(); const manualSeen=new Set();
  bk.transactions=bk.transactions.filter(t=>{
    if(t.srcId){
      if(seen.has(t.srcId)) return false;
      seen.add(t.srcId); return true;
    }
    // Manual entries kept as-is (no srcId)
    return true;
  });
}

  const period=filterMonth!==undefined&&filterYear!==undefined

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">

  <style>

// ── Reference number generator ─────────────────────────────────────────────
function generateBKRef(txType, sourceName){
  const bk = appState.bookkeeping;
  const prefixMap = {
    'ATC Salary':'SAL', 'Allriot':'FRL', 'Other Income':'OTH',
    'Freelance Income':'FRL', 'Salary':'SAL', 'Bonus':'BON',
    'Bank 1':'BNK', 'Bank 2':'BNK', 'Bank 3':'BNK',
    'Car':'CAR', 'Sewa':'SEW', 'House Rent':'RNT',
    'PH Allowance':'PHA', 'Groceries':'GRO', 'Utilities':'UTL',
    'Phone':'PHN', 'Internet':'NET', 'Insurance':'INS',
    'Entertainment':'ENT', 'Other':'OTH',
  };
  // Match by label prefix
  let pfx = 'TXN';
  if(txType === 'income') pfx = 'INC';
  if(txType === 'expense') pfx = 'EXP';
  if(txType === 'transfer') pfx = 'TRF';
  if(txType === 'journal') pfx = 'JNL';
  if(sourceName){
    for(const [k,v] of Object.entries(prefixMap)){
      if(sourceName.toLowerCase().includes(k.toLowerCase())){ pfx=v; break; }
    }
  }
  // Find the highest existing number for this prefix
  const existing = (bk.transactions||[]).filter(t=>(t.ref||'').startsWith(pfx+'-')).map(t=>parseInt((t.ref||'').replace(pfx+'-',''))||0);
  const next = existing.length ? Math.max(...existing)+1 : 1;
  return pfx+'-'+String(next).padStart(3,'0');
}

      {val:'journal',  label:'📓 Journal',  hint:'Adjusting entry'},
    ];
    typeOpts.forEach(({val,label,hint})=>{
      const btn=document.createElement('button'); btn.type='button';
      const isActive=d.txType===val;
      btn.style.cssText=`padding:10px 12px;border-radius:var(--radius-sm);border:2px solid ${isActive?'var(--teal)':'var(--border)'};background:${isActive?'var(--teal-bg)':'var(--white)'};cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .12s;`;
      btn.innerHTML=`<div style="font-size:13px;font-weight:600;color:${isActive?'var(--teal)':'var(--text)'}">${label}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${hint}</div>`;
      btn.addEventListener('click',()=>{
        if(d.txType===val) return; // no change
        d.txType=val;
        // Clear all user-entered fields on type switch
        d.description=''; d.amount=''; d.srcLabel=''; d.notes=''; d.ref='';
        // Auto-assign account based on type
        if(val==='income') d.accountId=(appState.bookkeeping.accounts.find(a=>a.id==='bk_rev')||appState.bookkeeping.accounts[0])?.id||'';
        else if(val==='expense') d.accountId=(appState.bookkeeping.accounts.find(a=>a.id==='bk_op')||appState.bookkeeping.accounts[0])?.id||'';
        else d.accountId=(appState.bookkeeping.accounts[0]||{}).id||'';
        buildBKTxModal(m);
      });
      typeRow.appendChild(btn);
    });
    typeG.appendChild(typeRow); m.appendChild(typeG);

    // ── Step 2: Pick from list for income/expense ──────────────────────────
    if(d.txType==='income'||d.txType==='expense'){
      const bm=appState.budgetMonth, by=appState.budgetYear;
      const mbItems=(appState.monthlyBudget||[]).filter(i=>i.month===bm&&i.year===by&&i.type===d.txType);
      const dashItems=d.txType==='income'
        ?(appState.dashIncome||[]).filter(i=>i.month===bm&&i.year===by)
        :(appState.dashExpense||[]).filter(i=>i.month===bm&&i.year===by);
      const allItems=[...mbItems, ...dashItems];

      if(allItems.length){
        const pickG=document.createElement('div'); pickG.className='form-group';
        pickG.innerHTML=`<label class="form-label">${d.txType==='income'?'Income Source':'Expense Item'} <span style="color:var(--hint);font-weight:400">— select to auto-fill</span></label>`;
        const pickSel=document.createElement('select'); pickSel.className='form-select';
        const blank=document.createElement('option'); blank.value=''; blank.textContent='— Select or type manually below —'; pickSel.appendChild(blank);
        allItems.forEach((item,idx)=>{
          const label=item.label||item.name||item.category||'Entry';
          const amt=parseFloat(item.amount||0);
          const cur=item.currency||'AED';
          const sym=cur==='PHP'?'₱':cur==='USD'?'$':'AED ';
          const o=document.createElement('option'); o.value=idx; o.textContent=`${label} — ${sym}${amt.toLocaleString('en-US',{minimumFractionDigits:2})}`;
          pickSel.appendChild(o);
        });
        // Pre-select if srcLabel matches
        if(d.srcLabel){
          const matchIdx=allItems.findIndex(i=>(i.label||i.name||i.category||'')=== d.srcLabel);
          if(matchIdx>=0) pickSel.value=String(matchIdx);
        }
        pickSel.addEventListener('change',e=>{
          const idx=parseInt(e.target.value);
          if(isNaN(idx)) return;
          const item=allItems[idx];
          const label=item.label||item.name||item.category||'Entry';
          d.description=label;
          d.srcLabel=label;
          d.amount=parseFloat(item.amount||0);
          d.currency=item.currency||'AED';
          d.ref=generateBKRef(d.txType, label);
          // Auto-assign appropriate account
          if(d.txType==='income') d.accountId=(appState.bookkeeping.accounts.find(a=>a.id==='bk_rev')||appState.bookkeeping.accounts[0])?.id||'';
          else d.accountId=(appState.bookkeeping.accounts.find(a=>a.id==='bk_op')||appState.bookkeeping.accounts[0])?.id||'';
          buildBKTxModal(m);
        });
        pickG.appendChild(pickSel); m.appendChild(pickG);
      }
    }
  }

  // ── Fields ──────────────────────────────────────────────────────────────
  const r1=document.createElement('div'); r1.className='form-row';
  r1.appendChild(fg('Date','date',d.date,'',v=>d.date=v));
  // Reference # with auto-gen
  const refG=document.createElement('div'); refG.className='form-group';
  refG.innerHTML='<label class="form-label">Reference # <span style="color:var(--hint);font-weight:400">(auto-generated, editable)</span></label>';
  const refRow=document.createElement('div'); refRow.style.cssText='display:flex;gap:6px;align-items:center;';
  const refInp=document.createElement('input'); refInp.className='form-input'; refInp.type='text'; refInp.placeholder='e.g. SAL-001'; refInp.value=d.ref||'';
  refInp.addEventListener('input',e=>d.ref=e.target.value);
  const genRefBtn=document.createElement('button'); genRefBtn.type='button'; genRefBtn.className='btn btn-outline btn-sm'; genRefBtn.textContent='Auto'; genRefBtn.title='Generate reference number';
  genRefBtn.addEventListener('click',()=>{ d.ref=generateBKRef(d.txType||'expense', d.description||''); buildBKTxModal(m); });
  refRow.appendChild(refInp); refRow.appendChild(genRefBtn); refG.appendChild(refRow);
  r1.appendChild(refG);
  m.appendChild(r1);

  m.appendChild(fg('Description *','text',d.description||'','e.g. ATC Salary June',v=>d.description=v));

  // Account
  const ag=document.createElement('div'); ag.className='form-group';
  const aLabelRow=document.createElement('div'); aLabelRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;';
  const aLabel=document.createElement('label'); aLabel.className='form-label'; aLabel.style.marginBottom='0'; aLabel.textContent='Account';
  const addAccBtn=document.createElement('button'); addAccBtn.type='button'; addAccBtn.className='btn btn-sm btn-outline';
  addAccBtn.style.cssText='font-size:10px;padding:2px 8px;color:var(--teal);border-color:var(--teal);';
  addAccBtn.innerHTML='+ Add Account';
  addAccBtn.addEventListener('click',()=>{ const prev=appState.modal; appState._bkTxPrev=prev; openBKAccModal(null); });
  aLabelRow.appendChild(aLabel); aLabelRow.appendChild(addAccBtn); ag.appendChild(aLabelRow);
  const aSel=document.createElement('select'); aSel.className='form-select';
  (appState.bookkeeping.accounts||[]).forEach(acc=>{ const o=document.createElement('option'); o.value=acc.id; o.textContent=`[${acc.code||acc.type}] ${acc.name}`; if(acc.id===d.accountId)o.selected=true; aSel.appendChild(o); });
  aSel.addEventListener('change',e=>d.accountId=e.target.value); ag.appendChild(aSel); m.appendChild(ag);

  // Currency
  const bkCurG=document.createElement('div'); bkCurG.className='form-group'; bkCurG.innerHTML='<label class="form-label">Currency</label>';
  const bkCurRow=document.createElement('div'); bkCurRow.style.cssText='display:flex;gap:6px;';
  ['AED','PHP','USD'].forEach(cc=>{
    const btn=document.createElement('button'); btn.type='button'; btn.className='btn btn-sm'+((d.currency||'AED')===cc?' btn-primary':' btn-outline');
    btn.textContent=cc==='AED'?'🇦🇪 AED':cc==='PHP'?'🇵🇭 PHP':'🇺🇸 USD';
    btn.addEventListener('click',()=>{ d.currency=cc; buildBKTxModal(m); });
    bkCurRow.appendChild(btn);
  });
  bkCurG.appendChild(bkCurRow); m.appendChild(bkCurG);

  const dispAmt=d.amount?(Math.round(parseFloat(d.amount)*100)/100).toFixed(2):'';
  m.appendChild(fg('Amount','number',dispAmt,'0.00',v=>d.amount=Math.round(parseFloat(v)*100)/100||0));
  m.appendChild(fg('Notes','text',d.notes||'','Optional',v=>d.notes=v));

  const foot=document.createElement('div'); foot.className='modal-footer';
  const cancel=document.createElement('button'); cancel.className='btn btn-outline'; cancel.textContent='Cancel'; cancel.addEventListener('click',()=>{appState.modal=null;render();});
  const save=document.createElement('button'); save.className='btn btn-primary'; save.textContent=isEdit?'Save':'Post Transaction';
  save.addEventListener('click',()=>{
    if(!d.description){toast('Enter a description');return;}
    if(!d.amount){toast('Enter an amount');return;}
    if(!d.ref) d.ref=generateBKRef(d.txType||'expense', d.description);
    const idx=(appState.bookkeeping.transactions||[]).findIndex(t=>t.id===d.id);
    if(idx>-1) appState.bookkeeping.transactions[idx]={...d}; else { appState.bookkeeping.transactions.push({...d}); }
    saveLocal(); appState.modal=null; toast(isEdit?'Transaction updated!':'Transaction posted! Ref: '+d.ref); render();
  });
  if(isEdit){ const del=document.createElement('button'); del.className='btn btn-danger'; del.textContent='Delete'; del.addEventListener('click',()=>{ appState.bookkeeping.transactions=appState.bookkeeping.transactions.filter(t=>t.id!==d.id); saveLocal(); appState.modal=null; toast('Deleted'); render(); }); foot.appendChild(del); }
  foot.appendChild(cancel); foot.appendChild(save); m.appendChild(foot);
}
function openBKAccModal(acc){
  appState.modal={type:'bk_acc',data:acc?{...acc}:{id:'bkacc_'+Date.now(),code:'',name:'',type:'Assets'}}; render();
}
function buildBKAccModal(m){

  m.innerHTML=`<div class="modal-title">${isEdit?'Edit':'Add'} Account</div>`;
  const r1=document.createElement('div'); r1.className='form-row';
  r1.appendChild(fg('Code','text',d.code||'','e.g. 1001',v=>d.code=v));
  r1.appendChild(fg('Account Name *','text',d.name||'','e.g. Cash',v=>d.name=v));
  m.appendChild(r1);
  const tg=document.createElement('div'); tg.className='form-group'; tg.innerHTML='<label class="form-label">Account Type</label>';
  const tSel=document.createElement('select'); tSel.className='form-select';
  BK_ACCOUNT_TYPES.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; if(t===d.type)o.selected=true; tSel.appendChild(o); });
  tSel.addEventListener('change',e=>d.type=e.target.value); tg.appendChild(tSel); m.appendChild(tg);
  const foot=document.createElement('div'); foot.className='modal-footer';
  const cancel=document.createElement('button'); cancel.className='btn btn-outline'; cancel.textContent='Cancel'; cancel.addEventListener('click',()=>{appState.modal=null;render();});
  const save=document.createElement('button'); save.className='btn btn-primary'; save.textContent=isEdit?'Save':'Add Account';
  save.addEventListener('click',()=>{
    if(!d.name){toast('Account name required');return;}
    const idx=appState.bookkeeping.accounts.findIndex(a=>a.id===d.id);
    if(idx>-1) appState.bookkeeping.accounts[idx]={...d}; else appState.bookkeeping.accounts.push({...d});
    saveLocal(); appState.modal=null; toast(isEdit?'Account updated!':'Account added!'); render();
  });
  foot.appendChild(cancel); foot.appendChild(save); m.appendChild(foot);
}
window.openBKTxModal=openBKTxModal; window.openBKAccModal=openBKAccModal; window.openBKImportModal=openBKImportModal;

}

// ── Edit budget entry ─────────────────────────────────────────────────────────
function openEditBudgetModal(type, item){

}

function buildBudgetIncomeModal(m, editItem){
  // ── Draft management ─────────────────────────────────────────────────────
  // We store draft on the modal element so re-renders keep state intact.
  const isEdit = !!editItem;
  if(isEdit){
    if(!m._editDraft) m._editDraft = {...editItem};
  } else {
    if(!m._draft) m._draft = {
      date: new Date().toISOString().slice(0,10),
      source:'', category:'Freelance Income', subType:'Salary',
      amount:'', currency:'USD', notes:'', clientId:''
    };
  }
  const d = isEdit ? m._editDraft : m._draft;

  // ── Constants ─────────────────────────────────────────────────────────────
  const TOP_CATS    = ['Freelance Income','Full-Time Job','Investment','Remittance','Refund','Gift','Other'];
  const HAS_CLIENTS = ['Freelance Income','Full-Time Job'];  // show client cards
  const cat    = d.category || 'Freelance Income';
  const subType= d.subType  || 'Salary';
  const isSalary = subType === 'Salary';
  const isBonus  = subType === 'Bonus';
  const hasClients = HAS_CLIENTS.includes(cat);

  // ── Rebuild modal contents (keep element, swap children) ──────────────────
  m.innerHTML = `<div class="modal-title">${isEdit?'Edit Income':'Add Income'}</div>`;

  // ── 1. Top category selector ───────────────────────────────────────────────
  const cgEl = document.createElement('div'); cgEl.className='form-group';
  cgEl.innerHTML = '<label class="form-label">Category</label>';
  const cSel = document.createElement('select'); cSel.className='form-select';
  TOP_CATS.forEach(c=>{
    const o=document.createElement('option'); o.value=c;
    o.textContent=c==='Freelance Income'?'🏠 WFH / Freelance':c==='Full-Time Job'?'🏢 Onsite / Full-Time':c;
    if(c===cat) o.selected=true;
    cSel.appendChild(o);
  });
  cSel.addEventListener('change', e=>{
    const newCat = e.target.value;
    if(newCat === d.category) return;
    // Switching category → clear everything that's category-specific
    d.category  = newCat;
    d.source    = '';
    d.clientId  = '';
    d.amount    = '';
    d.notes     = '';
    d.currency  = 'USD';
    d.subType   = HAS_CLIENTS.includes(newCat) ? 'Salary' : '';
    buildBudgetIncomeModal(m, isEdit ? d : null);
  });
  cgEl.appendChild(cSel);
  m.appendChild(cgEl);

  // ── 2. Salary / Bonus toggle (only for Freelance Income & Full-Time Job) ──
  if(hasClients){
    const stG = document.createElement('div'); stG.className='form-group';
    stG.innerHTML = '<label class="form-label">Income Type</label>';
    const stRow = document.createElement('div');
    stRow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;';

    [{val:'Salary',icon:'💼',hint: cat==='Full-Time Job'?'Fixed monthly / onsite pay':'Hours-based / remote earnings'},
     {val:'Bonus', icon:'🎁',hint:'Extra / one-time bonus'}
    ].forEach(({val,icon,hint})=>{
      const isActive = subType === val;
      const btn = document.createElement('button'); btn.type='button';
      btn.style.cssText = `padding:10px 12px;border-radius:var(--radius-sm);border:2px solid ${isActive?'var(--teal)':'var(--border)'};background:${isActive?'var(--teal-bg)':'var(--white)'};cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .12s;`;
      btn.innerHTML = `<div style="font-size:13px;font-weight:600;color:${isActive?'var(--teal)':'var(--text)'}">${icon} ${val}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${hint}</div>`;
      btn.addEventListener('click', ()=>{
        if(d.subType === val) return;
        // Switching subType → clear client selection + amount + notes ONLY
        // Category stays intact
        d.subType   = val;
        d.source    = '';
        d.clientId  = '';
        d.amount    = '';
        d.notes     = '';
        // Keep d.currency as-is (or reset to USD if no client selected)
        d.currency  = 'USD';
        buildBudgetIncomeModal(m, isEdit ? d : null);
      });
      stRow.appendChild(btn);
    });
    stG.appendChild(stRow);
    m.appendChild(stG);
  }

  // ── 3. Client cards ────────────────────────────────────────────────────────
  if(hasClients){
    const clients = appState.clients || [];
    const clG = document.createElement('div'); clG.className='form-group';
    const subLabel = isSalary
      ? (cat==='Full-Time Job' ? 'Company — auto-fills salary' : 'Client — auto-fills from hours logged')
      : 'Company / Client — who gave the bonus';
    clG.innerHTML = `<label class="form-label">${cat==='Full-Time Job'?'Company':'From Client'} <span style="color:var(--hint);font-weight:400;font-size:11px;">${subLabel}</span></label>`;

    if(clients.length > 0){
      clients.filter(c=>{
        const it=c.incomeType||'wfh';
        if(cat==='Freelance Income') return it==='wfh';
        if(cat==='Full-Time Job')    return it==='onsite';
        return true;
      }).forEach(c=>{
        const cd      = appState.clientData[c.id] || {entries:[]};
        const entries = cd.entries || [];
        const clientCur = c.rateCurrency || 'USD';
        const sym = clientCur==='PHP'?'₱':clientCur==='AED'?'AED ':'$';

        // Compute latest month hours + amount
        let latestMonth='', latestHours=0, latestAmt=0;
        if(entries.length){
          const sorted = [...entries].sort((a,b)=>b.date>a.date?1:-1);
          latestMonth  = sorted[0].date.slice(0,7);
          const mEnts  = entries.filter(e=>e.date&&e.date.startsWith(latestMonth));
          latestHours  = mEnts.reduce((s,e)=>s+(parseFloat(e.hours)||0), 0);
          const rateType = c.rateType || 'Hourly';
          if(rateType === 'Monthly'){
            latestAmt = c.rate || 0;
          } else if(rateType === 'Daily'){
            // count distinct days logged
            const days = new Set(mEnts.map(e=>e.date)).size;
            latestAmt = Math.round(days * (c.rate||0) * 100) / 100;
          } else {
            latestAmt = Math.round(latestHours * (c.rate||0) * 100) / 100;
          }
        }

        const isSelected = d.clientId === c.id;
        const monthLabel = latestMonth
          ? new Date(latestMonth+'-01').toLocaleDateString('en-US',{month:'short',year:'numeric'})
          : 'No entries';

        // FX equivalents for display
        const phpEq = latestAmt && phpRate
          ? (latestAmt * (clientCur==='USD'?phpRate : clientCur==='AED'?phpRate/3.67 : 1)).toLocaleString('en-PH',{minimumFractionDigits:2})
          : '—';
        const aedEq = latestAmt && clientCur==='USD'
          ? (latestAmt * (fxRates.AED||3.67)).toFixed(2)
          : '—';

        const card = document.createElement('div');
        card.style.cssText = `border:2px solid ${isSelected?'var(--teal)':'var(--border)'};border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;cursor:pointer;background:${isSelected?'var(--teal-bg)':'var(--white)'};transition:all .12s;`;

        // Sub-line depends on Salary vs Bonus
        let subLine = '';
        if(isSalary && latestAmt > 0){
          const rateType = c.rateType || 'Hourly';
          const rateDetail = rateType==='Monthly' ? 'monthly rate'
            : rateType==='Daily' ? `${new Set((entries||[]).filter(e=>e.date&&e.date.startsWith(latestMonth)).map(e=>e.date)).size} days`
            : `${latestHours.toFixed(1)}h logged`;
          subLine = `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${sym}${latestAmt.toFixed(2)} · ${monthLabel} · ${rateDetail}</div>`
                  + (clientCur==='USD' ? `<div style="font-size:11px;color:var(--hint);margin-top:1px;">≈ AED ${aedEq} · ≈ ₱${phpEq}</div>` : '');
        } else if(isSalary){
          subLine = `<div style="font-size:11px;color:var(--hint);margin-top:2px;">No entries yet · ${clientCur}</div>`;
        } else {
          // Bonus — just show company + currency, NO amount auto-fill
          subLine = `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${c.company||c.name} · ${clientCur} · Enter amount manually</div>`;
        }

        card.innerHTML = `<div style="font-weight:600;font-size:13px;color:${isSelected?'var(--teal)':'var(--text)'}">${c.company||c.name}${isSelected?' <span style="font-size:11px;margin-left:4px;">✓ selected</span>':''}</div>${subLine}`;

        card.addEventListener('click', ()=>{
          // IMPORTANT: only update client fields, never touch d.category or d.subType
          d.clientId = c.id;
          d.source   = c.company || c.name;
          d.currency = c.rateCurrency || 'USD';

          if(isSalary){
            // Auto-fill the running amount
            if(latestAmt > 0){
              d.amount = latestAmt.toFixed(2);
              const rateType = c.rateType || 'Hourly';
              const rateDetail = rateType==='Monthly' ? 'monthly rate'
                : rateType==='Daily'   ? `${new Set((entries||[]).filter(e=>e.date&&e.date.startsWith(latestMonth)).map(e=>e.date)).size} days @ ${clientCur} ${c.rate||0}/day`
                : `${latestHours.toFixed(1)}h @ ${clientCur} ${c.rate||0}/hr`;
              d.notes = `${monthLabel} — ${rateDetail}`;
            } else {
              d.amount = '';
              d.notes  = '';
            }
          } else {
            // Bonus: keep amount blank, auto-set note
            d.amount = '';
            d.notes  = `Bonus from ${c.company||c.name}`;
          }
          buildBudgetIncomeModal(m, isEdit ? d : null);
        });

        clG.appendChild(card);
      });

      // Bonus reminder tip
      if(isBonus){
        const tip = document.createElement('div');
        tip.style.cssText = 'font-size:11px;color:var(--amber);padding:6px 10px;background:var(--amber-bg);border-radius:var(--radius-sm);margin-top:4px;';
        tip.textContent   = '💡 Bonus — currency is auto-set from the selected company. Enter the amount below.';
        clG.appendChild(tip);
      }
    } else {
      // No clients — plain text input
      const manInp = document.createElement('input'); manInp.className='form-input'; manInp.type='text';
      manInp.placeholder = 'Enter company / source name'; manInp.value = d.source || '';
      manInp.addEventListener('input', e=>d.source=e.target.value);
      clG.appendChild(manInp);
    }
    m.appendChild(clG);
  } else {
    // Investment / Refund / Gift / Other — plain source field
    m.appendChild(fg('Source / Description','text', d.source||'', 'e.g. Stock dividends, GCash refund…', v=>d.source=v));
  }

  // ── 4. Date ────────────────────────────────────────────────────────────────
  m.appendChild(fg('Date','date', d.date||new Date().toISOString().slice(0,10), '', v=>d.date=v));

  // ── 5. Currency selector ───────────────────────────────────────────────────
  const curG = document.createElement('div'); curG.className='form-group';
  curG.innerHTML = '<label class="form-label">Currency</label>';
  const curRow = document.createElement('div'); curRow.style.cssText='display:flex;gap:6px;';
  ['AED','PHP','USD'].forEach(cc=>{
    const btn = document.createElement('button'); btn.type='button';
    btn.className='btn btn-sm' + ((d.currency||'USD')===cc ? ' btn-primary' : ' btn-outline');
    btn.textContent = cc==='AED'?'🇦🇪 AED' : cc==='PHP'?'🇵🇭 PHP' : '🇺🇸 USD';
    btn.addEventListener('click', ()=>{
      d.currency = cc;
      buildBudgetIncomeModal(m, isEdit ? d : null);
    });
    curRow.appendChild(btn);
  });
  curG.appendChild(curRow);
  m.appendChild(curG);

  // ── 6. Amount ─────────────────────────────────────────────────────────────
  const amtGrp = document.createElement('div'); amtGrp.className='form-group';
  const amtHint = hasClients && isBonus
    ? `Amount <span style="color:var(--amber);font-weight:500;">(enter manually — bonus is not auto-filled)</span>`
    : `Amount <span style="color:var(--hint);font-weight:400;">(in ${d.currency||'USD'})</span>`;
  amtGrp.innerHTML = `<label class="form-label">${amtHint}</label>`;
  const amtInp = document.createElement('input'); amtInp.className='form-input'; amtInp.type='number'; amtInp.step='0.01'; amtInp.placeholder='0.00'; amtInp.value=d.amount||'';
  const amtPrev = document.createElement('div'); amtPrev.style.cssText='font-size:11px;color:var(--teal);margin-top:4px;padding:5px 10px;background:var(--teal-bg);border-radius:4px;display:none;';
  const updatePrev = val=>{
    const n=parseFloat(val)||0; if(!n){ amtPrev.style.display='none'; return; }
    const cur=d.currency||'USD';
    try{
      const parts=Object.keys(CURRENCIES).filter(c=>c!==cur).map(c=>budgetFmtCurrency(n,c));
      amtPrev.textContent='≈ '+parts.join(' · ')+' (live rate)';
      amtPrev.style.display='block';
    } catch(e){}
  };
  amtInp.addEventListener('input', e=>{ d.amount=e.target.value; updatePrev(e.target.value); });

  cancel.addEventListener('click', ()=>{ appState.modal=null; render(); });

  const save = document.createElement('button'); save.className='btn btn-primary';
  save.textContent = isEdit ? 'Save' : 'Save Income';
  save.addEventListener('click', ()=>{
    if(hasClients && !d.clientId && !d.source){ toast('Select a client or enter a source'); return; }
    if(!hasClients && !d.source){ toast('Enter a source'); return; }
    if(!d.amount || parseFloat(d.amount)<=0){ toast('Enter a valid amount'); return; }
    const entry = {...d, amount:parseFloat(d.amount), subType:d.subType||''};
    if(isEdit){
      const idx = appState.budget.income.findIndex(i=>i.id===editItem.id);
      if(idx>-1) appState.budget.income[idx]=entry;
    } else {
      entry.id = uid(); entry.createdAt = Date.now();
      if(!appState.budget.income) appState.budget.income=[];
      appState.budget.income.push(entry);
      if(d.date){
        appState.budgetMonth = new Date(d.date+'T00:00:00').getMonth();
        appState.budgetYear  = new Date(d.date+'T00:00:00').getFullYear();
      }
    }
    appState.budgetTab = 'income';
    saveLocal(); appState.modal=null;
    toast(isEdit?'\u2713 Income updated!':'\u2713 Income added!');
    render();
  });

  if(isEdit){
    const del = document.createElement('button'); del.className='btn btn-danger'; del.textContent='Delete';
    del.addEventListener('click', ()=>{
      appState.budget.income = appState.budget.income.filter(i=>i.id!==editItem.id);
      saveLocal(); appState.modal=null; toast('Income deleted'); render();
    });
    foot.appendChild(del);
  }
  foot.appendChild(cancel); foot.appendChild(save); m.appendChild(foot);
}

// ── GLOBAL CLOCK (runs once, updates DOM by ID — no re-render) ────────────
function _startGlobalClock(){
  if(window._phGlobalClockRunning) return;
  window._phGlobalClockRunning = true;

  function fmtTZ(tz){
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:tz}));
    let h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
    const ampm=h>=12?'PM':'AM';
    h=h%12||12;
    return {
      time:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,
      short:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,
      ampm,
      date:now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})
    };
  }

  function setEl(id, val){ const el=document.getElementById(id); if(el){ const tn=el.childNodes[0]; if(tn&&tn.nodeType===3) tn.textContent=val; else el.insertBefore(document.createTextNode(val),el.firstChild); } }
  function setText(id, val){ const el=document.getElementById(id); if(el) el.textContent=val; }

  function tick(){
    // PH — sidebar main clock
    const ph=fmtTZ('Asia/Manila');
    setEl('ph-time', ph.time);
    setText('ph-ampm', ph.ampm);
    setText('ph-date', ph.date);
    // Sidebar secondary clocks
    const uae=fmtTZ('Asia/Dubai');
    const us=fmtTZ('America/New_York');
    const uk=fmtTZ('Europe/London');
    setEl('sb-uae-time', uae.short); setText('sb-uae-ampm', ' '+uae.ampm);
    setEl('sb-us-time', us.short);  setText('sb-us-ampm', ' '+us.ampm);
    setEl('sb-uk-time', uk.short);  setText('sb-uk-ampm', ' '+uk.ampm);
    // Top header clocks
    setText('th-ph',  ph.short+' '+ph.ampm);
    setText('th-uae', uae.short+' '+uae.ampm);
    setText('th-us',  us.short+' '+us.ampm);
    setText('th-uk',  uk.short+' '+uk.ampm);
    // Mobile clock strip
    setText('mob-ph-time', ph.time+' '+ph.ampm);
    setText('mob-ph-date', ph.date);
  }
  tick();
  setInterval(tick, 1000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
ghToken = sessionStorage.getItem('pv_gh_token')||localStorage.getItem('pv_gh_token')||'';
_startGlobalClock();

if(sessionStorage.getItem('sr_auth')==='1'){
  appState.loggedIn=true;
  fetchPhpRate().then(()=>render()); fetchFxRates();
  loadLocal(); ensureDefaultClient();
  render();
  if(appState.activeClientId && ghToken){
    loadClientDataFromGH(appState.activeClientId,true).then(ok=>{if(ok)render();});
  }
} else {
  render();
}
</script>
